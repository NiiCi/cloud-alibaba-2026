spring:
  application:
    name: service-order
  profiles:
    active: test
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        #namespace: 80546bd9-4745-417d-bc0e-1f60bdafb008
        namespace: 5d5d91ba-a655-497c-bbe5-f7fe9424a6ac
        username: nacos
        password: nacos
#      config: // springboot.2.4版本之前需要使用bootstrap依赖加配置bootstrap.yml文件的访问配置nacos.config
#        server-addr: 127.0.0.1:8848
#        username: nacos
#        password: nacos
#        #namespace: 80546bd9-4745-417d-bc0e-1f60bdafb008
#        namespace: 5d5d91ba-a655-497c-bbe5-f7fe9424a6ac
#        prefix: server-order
#        file-extension: yml
#        # 禁用import check避免不必要的警告
#        import-check:
#          enabled: false
    openfeign:
      client:
        config:
          # 使用于所有的feignClient的默认配置
          default:
            connectTimeout: 1000
            readTimeout: 2000
            loggerLevel: full
#            request-interceptors: 添加自定义请求拦截器方式一
#              - com.niici.order.interceptor.TokenRequestInterceptor
          # 自定义feignClient调用的超时时间
          service-product:
            connectTimeout: 3000
            readTimeout: 5000
            loggerLevel: full
    # 配置sentinel的控制台地址 - 配置后可在sentinel控制台查看
    sentinel:
      transport:
        dashboard: localhost:8080
      eager: true # sentinel默认懒加载, 需要服务调用后才显示在控制台, 设置为true则会主动将规则同步到控制台
      web-context-unify: false # 是否分割请求链路, true 不分割，false 分割 - 在流控规则为链路场景下，需要配置为false
      # Nacos持久化数据源配置
      datasource:
        # 流控规则
        flow:
          nacos:
            server-addr: 127.0.0.1:8848
            namespace: 5d5d91ba-a655-497c-bbe5-f7fe9424a6ac
            username: nacos
            password: nacos
            data-id: ${spring.application.name}-flow-rules
            group-id: SENTINEL_GROUP
            data-type: json
            rule-type: flow
        # 降级规则
#        degrade:
#          nacos:
#            server-addr: 127.0.0.1:8848
#            namespace: 5d5d91ba-a655-497c-bbe5-f7fe9424a6ac
#            username: nacos
#            password: nacos
#            data-id: ${spring.application.name}-degrade-rules
#            group-id: SENTINEL_GROUP
#            data-type: json
#            rule-type: degrade
        # 热点参数限流规则
#        param-flow:
#          nacos:
#            server-addr: 127.0.0.1:8848
#            namespace: 5d5d91ba-a655-497c-bbe5-f7fe9424a6ac
#            username: nacos
#            password: nacos
#            data-id: ${spring.application.name}-param-flow-rules
#            group-id: SENTINEL_GROUP
#            data-type: json
#            rule-type: param_flow
        # 授权规则
#        authority:
#          nacos:
