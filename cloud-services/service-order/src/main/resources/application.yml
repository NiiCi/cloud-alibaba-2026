#            group-id: SENTINEL_GROUP
#            data-type: json
#            rule-type: system


server:
  port: 8001

# 配置日志级别 -- 需要配置成debug
logging:
  level:
    com.niici.order: debug

# 开启feign的sentinel支持
feign:
  sentinel:
    enabled: true
