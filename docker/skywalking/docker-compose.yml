version: '3.8'

services:

  # ==================== SkyWalking OAP Server ====================
  skywalking-oap:
    image: apache/skywalking-oap-server:9.7.0
    container_name: skywalking-oap
    restart: always
    environment:
      SW_STORAGE: elasticsearch
      SW_STORAGE_ES_CLUSTER_NODES: es-node-1:9200,es-node-2:9200,es-node-3:9200
      SW_ES_USER: elastic
      SW_ES_PASSWORD: Es@2026#Admin
      SW_HEALTH_CHECKER: default
      SW_TELEMETRY: prometheus
      JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "11800:11800"   # gRPC 端口（Agent 上报）
      - "12800:12800"   # HTTP 端口（UI 查询）
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:12800/internal/l7check || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - sw-network
      - elasticstack_elk-network    # 复用 ELK 网络，连通 ES 集群

  # ==================== SkyWalking UI ====================
  skywalking-ui:
    image: apache/skywalking-ui:9.7.0
    container_name: skywalking-ui
    restart: always
    depends_on:
      - skywalking-oap
    environment:
      SW_OAP_ADDRESS: http://skywalking-oap:12800
    ports:
      - "8088:8080"    # 避免与 Sentinel Dashboard 8080 冲突
    networks:
      - sw-network

networks:
  sw-network:
    driver: bridge
  elasticstack_elk-network:
    external: true     # 引用 ELK 已创建的外部网络（elasticstack_elk-network）