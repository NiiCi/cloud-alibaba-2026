# ==================== Input ====================
input {
  # Beats 输入：接收 Filebeat 推送的日志（端口 5044）
  beats {
    port => 5044
  }
}

# ==================== Filter ====================
filter {
  # 识别 Spring Boot JSON 日志（logback 注入了 service 字段）
  # Filebeat 已通过 keys_under_root:true 将 JSON 字段展平到根节点
  if [service] {
    # 用应用实际打日志的 time 字段覆盖 @timestamp
    # 避免 @timestamp 显示 Logstash 收到日志的时间（比应用时间晕因网络延迟）
    date {
      match    => ["time", "yyyy-MM-dd HH:mm:ss.SSS"]
      target   => "@timestamp"
      timezone => "Asia/Shanghai"
    }

    # 清理冠余元数据字段
    mutate {
      remove_field => ["agent", "ecs", "input", "tags", "log"]
    }
  }
}

# ==================== Output ====================
output {
  # Spring Boot 微服务日志 → 按服务名 + 日期分索引
  # 索引格式：spring-logs-service-order-2026.03.19
  if [service] {
    elasticsearch {
      hosts    => ["http://es-node-1:9200", "http://es-node-2:9200", "http://es-node-3:9200"]
      user     => "${ES_USER}"
      password => "${ES_PASS}"
      index    => "spring-logs-%{[service]}-%{+YYYY.MM.dd}"
    }
  # 其他 Beats 来源（Metricbeat 等）保持原有索引命名规则
  } else {
    elasticsearch {
      hosts    => ["http://es-node-1:9200", "http://es-node-2:9200", "http://es-node-3:9200"]
      user     => "${ES_USER}"
      password => "${ES_PASS}"
      index    => "%{[@metadata][beat]}-%{[@metadata][version]}-%{+YYYY.MM.dd}"
    }
  }

  # 开发调试时打开，可在 Logstash 控制台看到采集到的数据（生产环境保持注释）
  # stdout { codec => rubydebug }
}
