# 基础 pipeline 配置
# input：监听 5044 端口接收 Beats 数据（Filebeat/Metricbeat）
input {
  beats {
    port => 5044
  }
}

# filter：数据处理（按需扩展，当前为直通）
filter {
  # 可在此添加 grok、mutate、date 等过滤规则
}

# output：将数据写入 Elasticsearch 集群
output {
  elasticsearch {
    hosts => ["http://es-node-1:9200", "http://es-node-2:9200", "http://es-node-3:9200"]
    user => "${ES_USER}"
    password => "${ES_PASS}"
    # 按数据来源动态生成索引名，格式如 filebeat-2026.03.17
    index => "%{[@metadata][beat]}-%{[@metadata][version]}-%{+YYYY.MM.dd}"
  }

  # 开发调试时开启，可在 Logstash 控制台看到数据（生产环境注释掉）
  # stdout { codec => rubydebug }
}
