version: '3.8'

services:

  # ==================== Elasticsearch Node 1 ====================
  es-node-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: es-node-1
    restart: always
    environment:
      # JVM 堆内存（3 节点各 512m，总计 1.5g，需 Docker Desktop 内存 ≥ 6GB）
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - _JAVA_OPTIONS=-XX:UseSVE=0
      - cluster.name=es-dev-cluster
      - node.name=es-node-1
      - discovery.seed_hosts=es-node-2,es-node-3
      - cluster.initial_master_nodes=es-node-1,es-node-2,es-node-3
      # 安全认证
      - xpack.security.enabled=true
      - xpack.security.enrollment.enabled=false
      # HTTP 层不开 SSL（开发环境，API 访问更方便）
      - xpack.security.http.ssl.enabled=false
      # 传输层 SSL（集群节点间通信必须开启）
      - xpack.security.transport.ssl.enabled=true
      - xpack.security.transport.ssl.verification_mode=certificate
      - xpack.security.transport.ssl.certificate_authorities=/usr/share/elasticsearch/config/certs/ca/ca.crt
      - xpack.security.transport.ssl.certificate=/usr/share/elasticsearch/config/certs/es-node-1/es-node-1.crt
      - xpack.security.transport.ssl.key=/usr/share/elasticsearch/config/certs/es-node-1/es-node-1.key
      - ELASTIC_PASSWORD=Es@2026#Admin
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - ./elasticsearch/config/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml
      - ./elasticsearch/certs:/usr/share/elasticsearch/config/certs
      - ./elasticsearch/node1/data:/usr/share/elasticsearch/data
      - ./elasticsearch/node1/logs:/usr/share/elasticsearch/logs
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65535
        hard: 65535
    networks:
      - elk-network

  # ==================== Elasticsearch Node 2 ====================
  es-node-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: es-node-2
    restart: always
    environment:
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - _JAVA_OPTIONS=-XX:UseSVE=0
      - cluster.name=es-dev-cluster
      - node.name=es-node-2
      - discovery.seed_hosts=es-node-1,es-node-3
      - cluster.initial_master_nodes=es-node-1,es-node-2,es-node-3
      - xpack.security.enabled=true
      - xpack.security.enrollment.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=true
      - xpack.security.transport.ssl.verification_mode=certificate
      - xpack.security.transport.ssl.certificate_authorities=/usr/share/elasticsearch/config/certs/ca/ca.crt
      - xpack.security.transport.ssl.certificate=/usr/share/elasticsearch/config/certs/es-node-2/es-node-2.crt
      - xpack.security.transport.ssl.key=/usr/share/elasticsearch/config/certs/es-node-2/es-node-2.key
      - ELASTIC_PASSWORD=Es@2026#Admin
    ports:
      - "9201:9200"
      - "9301:9300"
    volumes:
      - ./elasticsearch/config/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml
      - ./elasticsearch/certs:/usr/share/elasticsearch/config/certs
      - ./elasticsearch/node2/data:/usr/share/elasticsearch/data
      - ./elasticsearch/node2/logs:/usr/share/elasticsearch/logs
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65535
        hard: 65535
    networks:
      - elk-network

  # ==================== Elasticsearch Node 3 ====================
  es-node-3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: es-node-3
    restart: always
    environment:
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - _JAVA_OPTIONS=-XX:UseSVE=0
      - cluster.name=es-dev-cluster
      - node.name=es-node-3
      - discovery.seed_hosts=es-node-1,es-node-2
      - cluster.initial_master_nodes=es-node-1,es-node-2,es-node-3
      - xpack.security.enabled=true
      - xpack.security.enrollment.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=true
      - xpack.security.transport.ssl.verification_mode=certificate
      - xpack.security.transport.ssl.certificate_authorities=/usr/share/elasticsearch/config/certs/ca/ca.crt
      - xpack.security.transport.ssl.certificate=/usr/share/elasticsearch/config/certs/es-node-3/es-node-3.crt
      - xpack.security.transport.ssl.key=/usr/share/elasticsearch/config/certs/es-node-3/es-node-3.key
      - ELASTIC_PASSWORD=Es@2026#Admin
    ports:
      - "9202:9200"
      - "9302:9300"
    volumes:
      - ./elasticsearch/config/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml
      - ./elasticsearch/certs:/usr/share/elasticsearch/config/certs
      - ./elasticsearch/node3/data:/usr/share/elasticsearch/data
      - ./elasticsearch/node3/logs:/usr/share/elasticsearch/logs
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65535
        hard: 65535
    networks:
      - elk-network

  # ==================== Kibana ====================
  kibana:
    image: kibana:8.11.4
    container_name: kibana
    restart: always
    depends_on:
      - es-node-1
      - es-node-2
      - es-node-3
    ports:
      - "5601:5601"
    environment:
      - NODE_OPTIONS=--max-old-space-size=1024
    volumes:
      - ./kibana/config/kibana.yml:/usr/share/kibana/config/kibana.yml
    networks:
      - elk-network

  # ==================== Logstash ====================
  logstash:
    image: logstash:8.11.4
    container_name: logstash
    restart: always
    depends_on:
      - es-node-1
      - es-node-2
      - es-node-3
    ports:
      - "5044:5044"
      - "9600:9600"
    environment:
      - LS_JAVA_OPTS=-Xms512m -Xmx1g
      - _JAVA_OPTIONS=-XX:UseSVE=0
      - ES_USER=elastic
      - ES_PASS=Es@2026#Admin
    volumes:
      - ./logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml
      - ./logstash/pipeline:/usr/share/logstash/pipeline
      - ./logstash/logs:/usr/share/logstash/logs
    networks:
      - elk-network

  # ==================== Filebeat ====================
  filebeat:
    image: elastic/filebeat:8.11.4
    container_name: filebeat
    restart: always
    user: root    # 需要 root 权限读取宿主机日志文件
    depends_on:
      - logstash
    volumes:
      # Filebeat 配置文件
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      # 挂载宿主机日志目录（只读），供 Filebeat 监控
      - /Users/niici/local/xjyc/cloud-alibaba-2026/logs:/var/log/microservices:ro
      # Filebeat 自身状态持久化（记录文件读取位置，防重复消费）
      - ./filebeat/data:/usr/share/filebeat/data
    networks:
      - elk-network

# ELK 统一网络
networks:
  elk-network:
    driver: bridge