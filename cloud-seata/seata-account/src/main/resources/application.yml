spring:
  application:
    name: seata-account
  datasource:
    url: jdbc:mysql://localhost:3306/account_db?useUnicode=true&characterEncoding=utf-8&useSSL=false
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  cloud:
    nacos:
      server-addr: 127.0.0.1:8848
      discovery:
        server-addr: 127.0.0.1:8848
        #namespace: 80546bd9-4745-417d-bc0e-1f60bdafb008
        namespace: 5d5d91ba-a655-497c-bbe5-f7fe9424a6ac
        username: nacos
        password: nacos
      config:
        server-addr: 127.0.0.1:8848
        username: nacos
        password: nacos
        namespace: 5d5d91ba-a655-497c-bbe5-f7fe9424a6ac
        prefix: seata-account
        file-extension: yml
        # 禁用import check避免不必要的警告
        import-check:
          enabled: false
server:
  port: 14000

mybatis:
  mapper-locations: classpath:mapper/*.xml

seata:
  enabled: true
  application-id: seata-account
  tx-service-group: default_tx_group  # 事务组名，需与server端一致
  # 从nacos上获取seata-server, 用于建立连接、发送事务请求
  registry:
    type: file
#    type: nacos
#    nacos:
#      server-addr: 127.0.0.1:8848
#      namespace: 5d5d91ba-a655-497c-bbe5-f7fe9424a6ac
#      group: SEATA_GROUP
#      application: seata-server  # 对应seata-server在Nacos注册的服务名
#      username: nacos
#      password: nacos
  # 从nacos上获取seata客户端配置
  config:
    type: nacos
    nacos:
      server-addr: 127.0.0.1:8848
      namespace: 5d5d91ba-a655-497c-bbe5-f7fe9424a6ac
      group: SEATA_GROUP
      username: nacos
      password: nacos
      data-id: seata-client.properties
